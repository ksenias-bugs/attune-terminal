<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 13" shape-rendering="crispEdges">
  <!-- Off-white rounded square background -->
  <rect width="16" height="13" fill="#FAFAF8" rx="2"/>

  <!-- Lil guy - exact pixel trace -->
  <!-- Body color -->
  <g fill="#C4795B">
    <!-- Row 0: top of head (8 wide, centered) -->
    <rect x="4" y="1" width="8" height="1"/>

    <!-- Row 1: head with eyes -->
    <rect x="4" y="2" width="1" height="1"/>
    <rect x="5" y="2" width="1" height="1"/>
    <!-- left eye is at x=6 -->
    <rect x="7" y="2" width="2" height="1"/>
    <!-- right eye is at x=9 -->
    <rect x="10" y="2" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>

    <!-- Row 2: body with side nubs -->
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="12" y="3" width="1" height="1"/>

    <!-- Row 3: body with side nubs -->
    <rect x="3" y="4" width="1" height="1"/>
    <rect x="4" y="4" width="8" height="1"/>
    <rect x="12" y="4" width="1" height="1"/>

    <!-- Row 4: body (no nubs) -->
    <rect x="4" y="5" width="8" height="1"/>

    <!-- Row 5: bottom body slightly narrower -->
    <rect x="4" y="6" width="8" height="1"/>

    <!-- Row 6: bottom of body -->
    <rect x="5" y="7" width="6" height="1"/>

    <!-- Legs (4 legs, 2 rows tall) -->
    <!-- Leg 1 -->
    <rect x="5" y="8" width="1" height="2"/>
    <!-- Leg 2 -->
    <rect x="7" y="8" width="1" height="2"/>
    <!-- Leg 3 -->
    <rect x="9" y="8" width="1" height="2"/>
    <!-- Leg 4 -->
    <rect x="10" y="8" width="1" height="2"/>
  </g>

  <!-- Eyes -->
  <g fill="#1A1A1A">
    <rect x="6" y="2" width="1" height="1"/>
    <rect x="9" y="2" width="1" height="1"/>
  </g>
</svg>
