<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attune Terminal</title>
  <link rel="stylesheet" href="../../dist/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Main App (always visible — launcher lives inside tabs) -->
  <div id="app-container">
    <!-- Tab Bar -->
    <div id="tab-bar">
      <div id="tab-bar-drag" class="drag-region"></div>
      <div id="tabs"></div>
      <button id="btn-new-tab" class="tab-btn-new" title="New tab (⌘T)">+</button>
      <div class="tab-bar-spacer"></div>
      <button id="btn-theme-toggle" class="tab-btn-theme" title="Toggle theme">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.36 10.06A6 6 0 015.94 2.64 6 6 0 1013.36 10.06z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Workspace -->
    <div id="workspace">
      <!-- File Explorer (left side) -->
      <div id="file-explorer">
        <div class="file-explorer-header">
          <span class="file-explorer-title">Files</span>
          <button id="btn-file-explorer-close" class="file-explorer-close" title="Close file explorer">&times;</button>
        </div>
        <div id="file-tree" class="file-tree"></div>
      </div>
      <button id="btn-file-explorer-toggle" class="file-explorer-toggle" title="Toggle file explorer">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Terminal Area (holds per-tab content: launchers and terminals) -->
      <div id="terminal-area">
        <div id="terminal-container"></div>
      </div>

      <!-- Sidebar -->
      <button id="btn-sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="sidebar">
        <!-- Quick Actions -->
        <div class="sidebar-section sidebar-actions">
          <button id="btn-attach-file" class="btn-attach" title="Pick a file to paste its path (⌘O)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8.5V3.5C2 2.67 2.67 2 3.5 2H9.5L14 6.5V12.5C14 13.33 13.33 14 12.5 14H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 2v5h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1.5 14L5 10.5M5 10.5V13.5M5 10.5H2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Attach File Path
          </button>
        </div>

        <!-- Slash Commands -->
        <div class="sidebar-section">
          <div class="sidebar-section-header">Commands</div>
          <div id="slash-commands" class="command-list"></div>
        </div>

        <!-- Recent Sessions -->
        <div class="sidebar-section">
          <div class="sidebar-section-header">Recent Sessions</div>
          <div id="recent-sessions" class="recent-sessions-list">
            <div class="recent-sessions-empty">No recent sessions</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dist/renderer.js"></script>
</body>
</html>
